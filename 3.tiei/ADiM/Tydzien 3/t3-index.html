<!--

table - znacznik tabeli 
tr- table row 
td - table data
th - table head 
colspan - ilość kolumn na którą rozszerzy się th lub td
rowspan - ilość rzędów na którą rozszerzy się th lub td

w css najważniejsze 
overflow-x: auto; na divie w którym znajduje się tabela
na table,td i th border-collapse: collapse


-->
