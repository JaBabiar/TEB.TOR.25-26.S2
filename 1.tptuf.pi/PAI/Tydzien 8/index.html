<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./app.js" defer></script>
</head>
<body>
    <form id="formLogin">
        <!-- (label + input:text)*3 -->
        <label for="name">Imie:</label>
        <input type="text" name="name" id="name">
        
        <label for="date">Data Urodzenia:</label>
        <input type="date" name="date" id="date">
        
        <input type="submit" name="submit" id="submit">

        <!--
        input type submit - Input wyświetlany jako przycisk, wykonuje akcje submit
        button type submit - Podstawowy typ button, wykonuje akcje submit
        button type button - Wykonuje jedynie akcje click
        -->

    </form>
</body>
</html>
